<div id="defeat-notification-modal" class="modal-overlay" style="display: none;">
  <div class="modal-dialog defeat-notification-dialog">
    <div class="defeat-notification-title">
      <span data-i18n="templates.defeat.title">Defeat!</span>
      <button class="modal-close" id="defeat-notification-close">×</button>
    </div>
    <div class="defeat-notification-content">
      <div class="defeat-message">
        <p class="defeat-text" id="defeat-message-text">
          <!-- Defeat message will be inserted here -->
        </p>
      </div>
    </div>
    <div class="modal-buttons">
      <button class="modal-button primary" id="defeat-notification-ok" data-i18n="dialogs.ok">OK</button>
    </div>
  </div>
</div>
