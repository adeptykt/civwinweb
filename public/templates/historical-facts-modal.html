<div id="historical-facts-modal" class="historical-facts-modal">
  <div class="historical-facts-content">
    <div class="historical-facts-header">
      <h2>Historical Fact</h2>
      <button class="historical-facts-close" aria-label="Close">×</button>
    </div>
    <div class="historical-facts-body">
      <div class="historical-facts-year"></div>
      <h3 class="historical-facts-title"></h3>
      <p class="historical-facts-description"></p>
    </div>
    <div class="historical-facts-footer">
      <button class="historical-facts-ok">OK</button>
    </div>
  </div>
</div>
