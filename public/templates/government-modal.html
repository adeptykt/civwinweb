<div id="government-modal" class="modal-overlay" style="display: none;">
  <div class="modal-dialog government-dialog">
    <div class="modal-title">
      <span data-i18n="templates.government.title">🏛️ Choose Form of Government</span>
      <button class="modal-close" id="gov-close">×</button>
    </div>
    <div class="modal-content government-modal-content">
      <div class="gov-prompt" id="gov-prompt-text" data-i18n="templates.government.prompt">
        The period of Anarchy is over. Choose a new form of government:
      </div>

      <div class="gov-columns">
        <!-- Left: government list -->
        <div class="gov-list-section">
          <h3 data-i18n="templates.government.available">Available Governments</h3>
          <div class="gov-list" id="gov-list">
            <!-- Government options inserted here -->
          </div>
        </div>

        <!-- Right: details panel -->
        <div class="gov-details" id="gov-details">
          <h4 id="gov-detail-name" data-i18n="templates.government.selectPlaceholder">Select a government form</h4>
          <div class="gov-detail-desc" id="gov-detail-desc"></div>
          <div class="gov-detail-effects" id="gov-detail-effects"></div>
        </div>
      </div>
    </div>
    <div class="modal-buttons">
      <button class="modal-button" id="gov-cancel" data-i18n="dialogs.cancel">Cancel</button>
      <button class="modal-button primary" id="gov-select" disabled data-i18n="templates.government.establish">Establish Government</button>
    </div>
  </div>
</div>
